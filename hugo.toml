baseURL = "https://xcordis.github.io/"
languageCode = "zh-cn"
title = "Xcordis 的技术笔记"
theme = "hugo-theme-stack"
hasCJKLanguage = true
paginate = 10

[params]
description = "专注于 Django、Python 和自动化运维的技术分享"

# 侧边栏配置：取消了所有前面的空格缩进，防止解析错误
[params.sidebar]
avatar = "img/avatar.png"
background = "img/sidebar-background.png"
emoji = "🚀"
subtitle = "全栈开发 / 运维自动化"
widgets = [
    { type = "search" },
    { type = "archives" },
    { type = "categories" },
    { type = "tagcloud" }
]

[params.article]
math = false
toc = true
readingTime = true

[params.comments]
enabled = false

[params.footer]
since = 2026
customText = "写代码也是一种艺术"

# 导航菜单配置
[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 1
[menu.main.params]
icon = "home"

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 2
[menu.main.params]
icon = "archives"

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 3
[menu.main.params]
icon = "search"

# 社交链接
[[params.social]]
identifier = "github"
name = "GitHub"
url = "https://github.com/Xcordis"
[params.social.params]
icon = "brand-github"